name: Daily Competitor Intel Report

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests python-dateutil

      - name: Generate competitor report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VIDIQ_API_KEY: ${{ secrets.VIDIQ_API_KEY }}
          MY_CHANNEL_ID: UCbkLhZ5uUnOejyQmtK5GOOw
        run: |
          mkdir -p docs
          python scripts/generate_report.py > docs/output.txt 2>&1 || true
          cat docs/output.txt
          echo "<pre>$(cat docs/output.txt)</pre>" > docs/index.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
